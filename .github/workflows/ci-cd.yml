name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  APP_HOME: /home/workspace/letletme-wechat-bot
  APP_PORT: 8027
  BUN_CMD: /home/deploy/.bun/bin/bun

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -R dist bundle/dist
          cp -R scripts bundle/scripts
          cp README.md bundle/README.md
          cp DEPLOYMENT.md bundle/DEPLOYMENT.md
          tar -czf letletme-wechat-bot-dist.tar.gz -C bundle .

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: letletme-wechat-bot-dist
          path: letletme-wechat-bot-dist.tar.gz

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: letletme-wechat-bot-dist
          path: .

      - name: Create app home on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p "${{ env.APP_HOME }}"/{dist,logs,run,state,scripts}
            if [ ! -f "${{ env.APP_HOME }}/.env" ]; then
              printf '%s\n' \
                "WECHAT_STATE_FILE_PATH=${{ env.APP_HOME }}/state/wechat-state.json" \
                "BUN_CMD=${{ env.BUN_CMD }}" \
                "PORT=${{ env.APP_PORT }}" \
                "TIMEZONE=Australia/Perth" \
                > "${{ env.APP_HOME }}/.env"
              chmod 600 "${{ env.APP_HOME }}/.env"
            fi

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "letletme-wechat-bot-dist.tar.gz"
          target: "${{ env.APP_HOME }}/"
          strip_components: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd "${{ env.APP_HOME }}"
            tar -xzf letletme-wechat-bot-dist.tar.gz
            chmod +x scripts/*.sh
            ./scripts/rerun.sh
            for _ in {1..20}; do
              if curl -fsS "http://127.0.0.1:${{ env.APP_PORT }}/health" >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            ./scripts/monitor.sh
            exit 1
